<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rectangle</title>
</head>
<body>
<canvas id="canvass" width="700px" height="300px" style="border: 2px solid black"></canvas>
<div id="area"></div>
<div id="perimeter"></div>

<script>
    class Rectangle {
        constructor(length, width) {
            this.length = length;
            this.width = width;
        }

        getArea() {
            return this.length * this.width;
        }

        getPerimeter() {
            return (this.length + this.width) * 2;
        }

        drawRectangle() {
            const ctx = document.getElementById("canvass").getContext("2d");
            ctx.clearRect(0, 0, 700, 300);
            ctx.beginPath();
            ctx.rect(50, 50, this.length, this.width);
            ctx.stroke();
        }
    }

    let rectangle = new Rectangle(200, 100);

    function updateRectangle() {
        let newLength = prompt("Nhập chiều dài: ");
        let newWidth = prompt("Nhập chiều rộng: ");
        rectangle.length = parseInt(newLength);
        rectangle.width = parseInt(newWidth);
        rectangle.drawRectangle();
        document.getElementById("area").textContent = "Diện tích: " + rectangle.getArea();
        document.getElementById("perimeter").textContent = "Chu vi: " + rectangle.getPerimeter();
    }
    updateRectangle();
</script>
</body>
</html>
