<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product</title>
    <style>
        table {
            font-size: 30px;
            width: 100%;
            border: 1px solid black;
            border-collapse: collapse;
        }

        th, td {
            padding: 7px;
        }
    </style>
</head>
<body>
<div id="res"></div>
<script>
    let products = [];

    class Product {
        constructor(code, name, cost, quality) {
            this.code = code;
            this.name = name;
            this.cost = cost;
            this.quality = quality;
        }
    }

    products.push(new Product('SP001', 'Mac Mini M4', '13500000', '299'));
    products.push(new Product('SP002', 'Redmi K50 Ultra', '8000000', '199'));
    products.push(new Product('SP003', 'Tai nghe Lenovo thinkplus', '1000000', '399'));

    const result = document.getElementById("res");
    let table = '<table border="1px"><tr><th>Mã sản phẩm</th><th>Tên sản phẩm</th><th>Giá</th><th>Số lượng</th></tr>';
    for (let i = 0; i < products.length; i++) {
        table += `<tr>
            <td>${products[i].code}</td>
            <td>${products[i].name}</td>
            <td>${products[i].cost}</td>
            <td>${products[i].quality}</td>
        </tr>`;
    }
    table += '</table>';
    result.innerHTML = table;
</script>
</body>
</html>
