<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bai 1:</title>
</head>
<body>
<div id="res"></div>
<script>
    let a = [
        [1, 2, 1, 24],
        [8, 11, 9, 4],
        [7, 0, 7, 27],
        [7, 4, 28, 14],
        [3, 10, 26, 7]
    ];
    let res = "";
    for (let i = 0; i < a.length; i++) {
        res += `row ${i}<br>`;
        for (let j = 0; j < a[i].length; j++) {
            res += ` ${a[i][j]}<br>`;
        }
    }
    document.getElementById("res").innerHTML = res;
</script>
</body>
</html>
