<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bai 6:</title>
</head>
<body>
<div id="res"></div>
<script>
    let str = prompt("Nhập một chuỗi ký tự:");
    let arr = str.split("");
    for (let i = 0; i < arr.length; i++) {
        if (arr[i] === "-") {
            arr[i] = "_";
        }
    }
    let result = arr.join('');
    document.getElementById("res").innerHTML = "Kết quả sau khi thay thế: " + result;
</script>
</body>
</html>
