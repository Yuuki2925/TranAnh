<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bài 6:</title>
</head>
<body>
<script>
    let numbers = parseInt(prompt("Nhập số: "));
    let arr = [];
    for (let i = 0; i < numbers; i++) {
        arr[i] = parseInt(prompt("[" + i + "]"));
    }
    let check = parseInt(prompt("Nhap 1 so:"));
    let found = false;
    for (let i = 0; i < numbers; i++) {
        if (check === arr[i]) {
            found = true;
            break;
        }
    }
    if (!found) {
        alert("V is not in the array");
    } else {
        alert("V is in the array");
    }
</script>
</body>
</html>
