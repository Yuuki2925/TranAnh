<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Đếm số nguyên âm trong chuỗi</title>
</head>
<body>
<div id="res"></div>
<script>
    let str = prompt("Nhập chuỗi:");
    let arr = str.split(" ");
    let cnt = 0;
    for (let i = 0; i < arr.length; i++) {
        let num = parseInt(arr[i]);
        if (!isNaN(num) && num < 0) {
            cnt++;
        }
    }
    document.getElementById("res").innerHTML = `Số lượng số nguyên âm trong chuỗi là: ${cnt}`;
</script>
</body>
</html>
