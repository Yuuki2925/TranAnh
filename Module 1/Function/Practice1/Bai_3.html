<script>
    function sosanh(a, b) {
        if (a > b) {
            return `${a} lớn hơn ${b}`;
        } else if (a < b) {
            return `${a} bé hơn ${b}`;
        } else
            return `${a} bằng ${b}`;
    }

    let a = Number(prompt("Nhập a:"));
    let b = Number(prompt("Nhập b:"));
    document.write(sosanh(a, b));
</script>
