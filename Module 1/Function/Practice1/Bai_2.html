<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bai 2:</title>
    <script>
        function Increase(number){
            ++number;
            return number;
        }
    </script>
</head>
<body>
    <script>
        let nums = Number(prompt("Nhập số:"));
        document.write(Increase(nums));
    </script>
</body>
</html>
