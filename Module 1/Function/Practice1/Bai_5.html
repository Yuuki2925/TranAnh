    const star2 = ['Ursa Minor', 'Tarurus', 'Cygnus', 'Lyra', 'Aquila', 'Ursa Major', 'Leo'];

    function CheckStar(star) {
        let arr = [];
        let found = "Không tìm thấy sao";
        for (let i = 0; i < star1.length; i++) {
            if (star === star1[i]) {
                found = star2[i];
            }
        }
        return found;
    }

    let star = prompt("Nhập tên sao: ");
