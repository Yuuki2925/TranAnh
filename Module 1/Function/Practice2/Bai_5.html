<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bai 5:</title>
</head>
<body>
<script>
    function checkInt(a, b, c) {
        if (a <= b && a <= c) {
            alert(a + " min");
        } else if (b <= a && b <= c) {
            alert(b + " min");
        } else {
            alert(c + " min");
        }
    }

    let a = parseInt(prompt("Nhập a: "));
    let b = parseInt(prompt("Nhập b: "));
    let c = parseInt(prompt("Nhập c: "));
    checkInt(a, b, c);
</script>
</body>
</html>
