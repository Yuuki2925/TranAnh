<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bai 4:</title>
</head>
<body>
    <script>
        function Check(numbers){
            if(!isNaN(numbers)){
                return true;
            }
            else{
                return false;
            }
        }
        let nums = Number(prompt("Nhập số: "));
        alert(Check(nums));
    </script>
</body>
</html>
