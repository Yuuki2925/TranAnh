<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bai 8:</title>
</head>
<body>
<script>
    function Reverse(nums){
        return nums.reverse().join(", ");
    }
    let numbers = parseInt(prompt("Nhập số lượng phần tử:"));
    let arr = [];
    for(let i = 0; i < numbers; i++){
        arr[i] = prompt("Nhập phần tử thứ " + (i + 1) + ":");
    }
    document.write("Mảng sau khi đảo ngược: " + Reverse(arr));
</script>
</body>
</html>
