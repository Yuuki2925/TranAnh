<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bai 6:</title>
</head>
<body>
    <script>
        function check(nums){
            if(nums > 0){
                return true;
            }
            else{
                return false;
            }
        }
        let nums = parseInt(prompt("Nhập số: "));
        alert(check(nums));
    </script>
</body>
</html>
