<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bai 1:</title>
</head>
<body>
    <div id="res"></div>
    <script>
        function Pow(square){
            return square * square;
        }
        let numbers = Number(prompt("Nhập số: "));
        document.getElementById("res").innerHTML = `Bình phương của ${numbers} là: ` + Pow(numbers);
    </script>
</body>
</html>
